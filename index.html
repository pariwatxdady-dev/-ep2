```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Knowledge</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
text-align:center;
padding:30px;
background:#020617;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>
</head>

<body>

<header>
<h1>🚀 Tech Knowledge</h1>
<p>เว็บไซต์ความรู้เทคโนโลยี</p>
</header>

<div class="container">

<h2>บทความ</h2>

<div class="grid" id="posts"></div>

</div>

<footer>
<p>© 2026 Tech Website</p>
</footer>

<script>

let posts = JSON.parse(localStorage.getItem("posts")) || [];

let container = document.getElementById("posts");

posts.forEach(post => {

container.innerHTML += `
<div class="card">
<img src="${post.image}">
<div class="card-content">
<h3>${post.title}</h3>
<p>${post.text}</p>
</div>
</div>
`;

});

</script>

</body>
</html>
```
